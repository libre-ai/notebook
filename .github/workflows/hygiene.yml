name: hygiene

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Required repository policy files
        run: |
          set -euo pipefail
          test -s README.md
          test -s CONTRIBUTING.md
          test -s ROADMAP.md
          test -s SECURITY.md
          test -s LICENSE
          test -s .github/CODEOWNERS
      - name: Secret pattern smoke
        run: |
          set -euo pipefail
          if git grep -nEI '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----)' -- ':!Cargo.lock' ':!package-lock.json'; then
            echo "::error::potential secret pattern found"
            exit 1
          fi
