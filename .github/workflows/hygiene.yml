name: hygiene

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Required repository policy files
        run: |
          set -euo pipefail
          test -s README.md
          test -s CONTRIBUTING.md
          test -s ROADMAP.md
          test -s SECURITY.md
          test -s LICENSE
          test -s .github/CODEOWNERS
      - name: Secret pattern smoke
        run: |
          set -euo pipefail
          if git grep -nEI '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----)' -- ':!Cargo.lock' ':!package-lock.json'; then
            echo "::error::potential secret pattern found"
            exit 1
          fi
